#
# Render Blueprint for Hannibal V2
# 
# Advanced Multi-Tenant Media Management Platform
# Deployment configuration following Render best practices
#

services:
  # Main Next.js Web Service
  - type: web
    name: hannibal-v2
    runtime: node
    region: frankfurt  # EU region for GDPR compliance (change as needed)
    plan: starter  # Start with starter, upgrade to standard for production
    
    # Build configuration
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    
    # Health check endpoint
    healthCheckPath: /api/health
    
    # Auto-deploy on git push
    autoDeploy: true
    
    # Environment variables
    envVars:
      # Node.js configuration
      - key: NODE_VERSION
        value: 20
      
      - key: NODE_ENV
        value: production
      
      # Database (Neon PostgreSQL)
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard (contains credentials)
      
      # UploadThing (Image Storage)
      - key: UPLOADTHING_TOKEN
        sync: false  # Set manually in Render dashboard
      
      # QStash (Message Queue)
      - key: QSTASH_URL
        value: https://qstash.upstash.io
      
      - key: QSTASH_TOKEN
        sync: false  # Set manually in Render dashboard
      
      - key: QSTASH_CURRENT_SIGNING_KEY
        sync: false  # Set manually in Render dashboard
      
      - key: QSTASH_NEXT_SIGNING_KEY
        sync: false  # Set manually in Render dashboard
      
      # Anthropic AI
      - key: ANTHROPIC_API_KEY
        sync: false  # Set manually in Render dashboard
      
      # NewsAPI (Event Registry) for Autonomous Publications
      - key: EVENT_REGISTRY_API_KEY
        sync: false  # Set manually in Render dashboard
      
      # Application URLs
      - key: NEXT_PUBLIC_APP_URL
        sync: false  # Set to your production domain (e.g., https://yourdomain.com)
      
      - key: NEXT_PUBLIC_ADMIN_HOSTNAME
        sync: false  # Set to your admin domain (e.g., admin.yourdomain.com)
      
      # Render provides these automatically
      - key: RENDER_EXTERNAL_URL
        value: ${RENDER_EXTERNAL_URL}
      
      - key: RENDER_EXTERNAL_HOSTNAME
        value: ${RENDER_EXTERNAL_HOSTNAME}

# Notes for deployment:
# 
# 1. Before deploying:
#    - Create a new Web Service on Render
#    - Connect your GitHub repository
#    - Select this render.yaml as the blueprint
#
# 2. Set environment variables manually:
#    Go to your service dashboard > Environment
#    Add all variables marked with "sync: false"
#
# 3. Custom domains:
#    - Go to Settings > Custom Domains
#    - Add your admin domain (e.g., admin.yourdomain.com)
#    - Add wildcard domain for multi-tenant (e.g., *.sites.yourdomain.com)
#    - Update DNS records as instructed by Render
#
# 4. Health checks:
#    Create /app/api/health/route.ts with:
#    ```typescript
#    export async function GET() {
#      return Response.json({ status: 'ok' })
#    }
#    ```
#
# 5. Scaling:
#    - Starter plan: Good for development/testing
#    - Standard plan: Recommended for production (always-on, no cold starts)
#    - Pro plans: For high traffic (horizontal scaling)
#
# 6. Database connection:
#    - Neon is already optimized for serverless
#    - Keep connection pooling enabled in Neon dashboard
#    - Use the pooled connection string (contains -pooler in the URL)
#
# 7. QStash webhooks:
#    - Update webhook URLs to point to your Render domain
#    - Format: https://your-service.onrender.com/api/queue/campaign-publication
#
# 8. Monitoring:
#    - Enable Render's built-in monitoring
#    - Set up external uptime monitoring (UptimeRobot, Pingdom, etc.)
#    - Configure alert notifications

